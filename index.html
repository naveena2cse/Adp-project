<!DOCTYPE html>
<html>
<head>
<style> 
body{
margin: 0;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
font-family: Arial, sans-serif;
background-image: url("https://images.unsplash.com/photo-1507608869274-d3177c8bb4c7?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
background-size: cover;
background-position:  center, ;
background-repeat: no-repeat;
}
.container {
background: white;
background-image: url("https://cdn.pixabay.com/photo/2024/06/06/23/23/border-8813556_1280.png"),url("https://cdn.pixabay.com/photo/2024/06/06/23/23/border-8813556_1280.png");
background-position: right bottom,left top;
background-size:100px;
background-repeat:no-repeat;
width: 320px;
padding: 50px;
text-align: center;
/* Rounded corners */
border-radius: 50px;
/* Shadow effect */
box-shadow: 10px 15px 20px blue;
}
.container h2 {
margin-bottom: 25px;
text-shadow: 2px 2px red;
color: #2c3e50;
}
.container img {
width: 100%;
border-radius: 15px;
margin-bottom: 15px;
/* Image shadow */
box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
}
/* PARAGRAPH TEXT */
.container p {
font-size: 14px;
color: #555;
margin-bottom: 20px;
}
.container button {
padding: 10px 20px;
border: none;
border-radius: 25px;
background: green;
color: white;
font-size: 14px;
cursor: pointer;
/* Button shadow */
box-shadow: 5px 5px red;
}
</style>
</head>
<body>
 <div class="container">
 <h2> Welcome to AI World </h2>
 <img src="https://cdn.pixabay.com/photo/2016/04/04/14/12/monitor-1307227_640.jpg">
<p> Artificial Intelligence (AI) is a branch of computer science that enables machines to simulate human intelligence, including learning, reasoning, problem-solving, and decision-making </p>
   <button> Read More </button>
   </div>
</body>
</html>
